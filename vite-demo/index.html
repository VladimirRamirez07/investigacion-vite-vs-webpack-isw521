<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comparador de Productos — Vite</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Comparador de Productos</h1>
        <p class="badge">⚡ Powered by Vite</p>
      </header>

      <main>
        <section class="card">
          <h2>Agregar producto</h2>
          <form id="product-form">
            <div class="product-form">
              <div class="form-field">
                <label for="productName">Nombre</label>
                <input type="text" id="productName" name="productName" placeholder="Ej: Arroz 1kg" />
              </div>
              <div class="form-field">
                <label for="productPrice">Precio (₡)</label>
                <input type="number" id="productPrice" name="productPrice" placeholder="Ej: 1500" min="0" step="any" />
              </div>
              <button type="submit" class="primary-button">Agregar</button>
            </div>
            <p id="message" class="message"></p>
          </form>
        </section>

        <section class="card">
          <h2>Productos</h2>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Nombre</th>
                  <th>Precio</th>
                  <th>Acción</th>
                </tr>
              </thead>
              <tbody id="product-list"></tbody>
            </table>
            <p id="empty-message" class="empty-message">No hay productos agregados.</p>
          </div>
          <div class="actions">
            <button id="clear-button" type="button" class="secondary-button">Vaciar lista</button>
          </div>
        </section>

        <section class="card">
          <h2>Resumen</h2>
          <div class="summary">
            <div class="summary-item">
              <span>Subtotal</span>
              <strong id="subtotal">₡0,00</strong>
            </div>
            <div class="summary-item">
              <span>Impuesto (<span id="tax-rate">13</span>%)</span>
              <strong id="tax">₡0,00</strong>
            </div>
            <div class="summary-item summary-total">
              <span>Total</span>
              <strong id="total">₡0,00</strong>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
